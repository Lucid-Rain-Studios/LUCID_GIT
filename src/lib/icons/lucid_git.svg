<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1220"/>
      <stop offset="100%" stop-color="#070a13"/>
    </linearGradient>

    <!-- Prism faces — same geometry as Studio but warm-shifted to mark it as a module -->
    <linearGradient id="gPrismFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff4ec"/>
      <stop offset="55%" stop-color="#ffb585"/>
      <stop offset="100%" stop-color="#a64518"/>
    </linearGradient>
    <linearGradient id="gPrismLeft" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%" stop-color="#9a3d12"/>
      <stop offset="100%" stop-color="#3d1908"/>
    </linearGradient>
    <linearGradient id="gPrismRight" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%" stop-color="#ffd2b0"/>
      <stop offset="100%" stop-color="#c66832"/>
    </linearGradient>
    <linearGradient id="gPrismTop" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffc69e"/>
    </linearGradient>

    <radialGradient id="gCoreGlow" cx="0.5" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#ffd0a8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#a64518" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="gAmbient" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#e85d2f" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e85d2f" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="gBeam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffe8d4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="gSoftGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="branchGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bgGit)"/>
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#gAmbient)"/>

  <!-- Faint precision grid -->
  <g stroke="#251a14" stroke-width="1" opacity="0.5">
    <line x1="0" y1="256" x2="1024" y2="256"/>
    <line x1="0" y1="512" x2="1024" y2="512"/>
    <line x1="0" y1="768" x2="1024" y2="768"/>
    <line x1="256" y1="0" x2="256" y2="1024"/>
    <line x1="512" y1="0" x2="512" y2="1024"/>
    <line x1="768" y1="0" x2="768" y2="1024"/>
  </g>

  <!-- Refraction beam -->
  <rect x="80" y="500" width="864" height="24" fill="url(#gBeam)" opacity="0.7"/>

  <!-- The prism (same geometry as Studio) -->
  <g filter="url(#gSoftGlow)">
    <polygon points="512,232 512,792 740,580 740,420" fill="url(#gPrismRight)"/>
    <polygon points="512,232 512,792 284,580 284,420" fill="url(#gPrismLeft)"/>
    <polygon points="512,232 740,420 512,460 284,420" fill="url(#gPrismTop)"/>
    <polygon points="512,792 740,580 512,540 284,580" fill="url(#gPrismFront)" opacity="0.85"/>
    <polygon points="284,420 512,460 740,420 740,580 512,540 284,580" fill="url(#gPrismFront)" opacity="0.55"/>
  </g>

  <g fill="none" stroke="#ffd6b8" stroke-width="2.5" stroke-linejoin="round" opacity="0.85">
    <polygon points="512,232 740,420 740,580 512,792 284,580 284,420"/>
    <line x1="284" y1="420" x2="512" y2="460"/>
    <line x1="740" y1="420" x2="512" y2="460"/>
    <line x1="284" y1="580" x2="512" y2="540"/>
    <line x1="740" y1="580" x2="512" y2="540"/>
    <line x1="512" y1="232" x2="512" y2="460"/>
    <line x1="512" y1="540" x2="512" y2="792"/>
  </g>

  <ellipse cx="512" cy="500" rx="140" ry="80" fill="url(#gCoreGlow)"/>
  <ellipse cx="455" cy="380" rx="22" ry="8" fill="#ffffff" opacity="0.9" transform="rotate(-25 455 380)"/>

  <!-- Git branch motif overlaid on the prism core -->
  <!-- Three nodes connected by a branching line — abstracted, runs vertically through the prism -->
  <g filter="url(#branchGlow)">
    <!-- Vertical trunk -->
    <path d="M 512 360 L 512 660"
          stroke="#ffffff" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.95"/>
    <!-- Branch out and back (the classic git-branch curl) -->
    <path d="M 512 470 C 512 510, 600 510, 600 555 L 600 600 C 600 640, 540 640, 512 640"
          stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95"/>

    <!-- Top node -->
    <circle cx="512" cy="360" r="22" fill="#0d1220" stroke="#ffffff" stroke-width="8"/>
    <!-- Branch tip node -->
    <circle cx="600" cy="555" r="18" fill="#0d1220" stroke="#ffffff" stroke-width="7"/>
    <!-- Bottom node (merge point) -->
    <circle cx="512" cy="660" r="22" fill="#0d1220" stroke="#ffffff" stroke-width="8"/>
  </g>
</svg>
